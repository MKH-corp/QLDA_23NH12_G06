services:
  db:
    image: postgres:16-alpine
    container_name: work_kpi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: work_kpi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d work_kpi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
